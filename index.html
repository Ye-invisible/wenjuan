<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识你自己 · 解锁真实联结</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f9fd;
            overflow: hidden;
            background-image: linear-gradient(120deg, #f8f9fd 0%, #f0f2fa 100%);
        }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #eaeef5;
            z-index: 999;
        }
        .progress {
            height: 100%;
            background: #5F4B8B;
            width: 0%;
            transition: 0.35s ease;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            display: flex;
            transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .slide {
            min-width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white;
            width: 100%;
            max-width: 720px;
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(95,75,139,0.08);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #5F4B8B;
        }
        .title {
            font-size: 21px;
            margin-bottom: 28px;
            color: #2c3e50;
            line-height: 1.6;
            font-weight: 500;
        }
        .start-title {
            font-size: 24px;
            color: #5F4B8B;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .start-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            text-align: center;
        }
        .option {
            margin: 14px 0;
            padding: 14px 18px;
            border: 1px solid #eee;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
        }
        .option:hover {
            background: #f5f2ff;
            border-color: #c5b9e0;
        }
        .option input {
            width: 20px;
            height: 20px;
            margin-right: 14px;
            accent-color: #5F4B8B;
        }
        .nav-buttons {
            display: flex;
            gap: 14px;
            margin-top: 35px;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }
        .next, .start-btn {
            background: #5F4B8B;
            color: white;
        }
        .prev {
            background: #f1f3f6;
            color: #555;
        }
        .submit {
            background: #4CD9B0;
            color: white;
        }
        .save-btn {
            background: #5F4B8B;
            color: white;
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: modalIn 0.4s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content {
            background: white;
            max-width: 700px;
            width: 90%;
            padding: 45px 35px;
            border-radius: 24px;
            text-align: left;
            max-height: 90vh;
            overflow-y: auto;
        }
        .score {
            font-size: 20px;
            margin: 8px 0;
            color: #2c3e50;
        }
        .score span {
            font-size: 32px;
            color: #5F4B8B;
            font-weight: bold;
        }
        #resultText {
            font-size: 16px;
            line-height: 1.8;
            margin: 20px 0;
            color: #333;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<div class="progress-bar"><div class="progress" id="progress"></div></div>
<div class="slider" id="slider"></div>

<div class="modal" id="modal">
    <div class="modal-content" id="reportCard">
        <h2 style="color:#5F4B8B; margin-bottom:20px;">你的专属心理行为报告</h2>
        <div class="score">孤独感指数：<span id="score1">0</span></div>
        <div class="score">假性亲密指数：<span id="score2">0</span></div>
        <div id="resultText"></div>
        <button class="btn save-btn" onclick="saveReport()">保存报告图片</button>
        <button class="btn prev" onclick="closeModal()" style="margin-top:10px;">关闭</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 题目：17题（15+2定义）
const questions = [
  { q: "身边没有真正懂我的人", type: "lonely", name: "q1" },
  { q: "身处人群仍感到孤独", type: "lonely", name: "q2" },
  { q: "我习惯隐藏心事", type: "lonely", name: "q3" },
  { q: "我难以建立深度关系", type: "lonely", name: "q4" },
  { q: "我常感到空虚无寄托", type: "lonely", name: "q5" },
  { q: "我多是表面朋友，难信任", type: "fake", name: "q6" },
  { q: "我常隐藏真实想法迎合他人", type: "fake", name: "q7" },
  { q: "关系亲密但无深层交流", type: "fake", name: "q8" },
  { q: "我很少暴露脆弱", type: "fake", name: "q9" },
  { q: "表面关系结束我感到轻松", type: "fake", name: "q10" },
  { q: "我社交多为功利目的", type: "fake", name: "q11" },
  { q: "拿到生活费更愿意独自使用", type: "act", name: "act1" },
  { q: "心情不好独自消化不找人说", type: "act", name: "act2" },
  { q: "不想社交仍勉强参加怕尴尬", type: "act", name: "act3" },
  { q: "朋友倾诉我礼貌敷衍", type: "act", name: "act4" },
  // 新增2题
  { q: "你认为孤独是什么？", type: "belief", name: "belief_lonely" },
  { q: "你认为假性亲密是什么？", type: "belief", name: "belief_fake" },
];

// 随机打乱
const shuffled = [...questions].sort(() => Math.random() - 0.5);

// 基础信息
const basicSlides = [
  { title: "1. 性别", options: ["男","女"], name: "gender" },
  { title: "2. 年级", options: ["大一","大二","大三","大四","研究生"], name: "grade" },
  { title: "3. 是否住校", options: ["是","否"], name: "live" },
  { title: "4. 可交心挚友", options: ["0个","1-2个","3-5个","6个以上"], name: "friends" },
  { title: "5. 情感状态", options: ["单身","恋爱中","暧昧"], name: "love" },
  { title: "6. 家庭亲密程度", options: ["极高，无话不谈","较高，经常沟通","一般，偶尔联系","较低，疏远"], name: "family" },
];

// 生成页面
const slider = document.getElementById('slider');
let html = '';

// 开始页
html += `
<div class="slide">
  <div class="card">
    <div class="start-title">认识你自己 · 解锁真实联结</div>
    <div class="start-desc">孤独感 × 假性亲密 × 行为模式综合评估</div>
    <div class="start-desc">全程匿名｜专业报告｜数据云端存储</div>
    <div style="height:20px;"></div>
    <button class="btn start-btn" onclick="nextSlide()">开始测试 →</button>
  </div>
</div>`;

// 基础信息页
basicSlides.forEach(item => {
  html += `
<div class="slide">
  <div class="card">
    <div class="title">${item.title}</div>
    ${item.options.map(o => `
    <div class="option">
      <input type="radio" name="info_${item.name}" value="${o}">
      <label>${o}</label>
    </div>`).join('')}
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">返回</button>
      <button class="btn next" onclick="nextSlide()">下一步</button>
    </div>
  </div>
</div>`;
});

// 17题随机页
shuffled.forEach((item, i) => {
  if (item.name.startsWith('belief')) {
    const opts = item.name === 'belief_lonely' 
      ? ["只是没人陪", "情感需求未被满足的痛苦", "性格内向", "想太多"]
      : ["关系很好只是话少", "表面亲近但内心疏远", "相处舒服就行", "正常社交"];
    html += `
<div class="slide">
  <div class="card">
    <div class="title">${i+1}. ${item.q}</div>
    ${opts.map(o => `
    <div class="option">
      <input type="radio" name="${item.name}" value="${o}">
      <label>${o}</label>
    </div>`).join('')}
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">上一题</button>
      <button class="btn next" onclick="nextSlide()">下一题</button>
    </div>
  </div>
</div>`;
  } else {
    html += `
<div class="slide">
  <div class="card">
    <div class="title">${i+1}. ${item.q}</div>
    <div class="option"><input type="radio" name="${item.name}" value="1"><label>完全不符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="2"><label>不太符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="3"><label>不确定</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="4"><label>比较符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="5"><label>完全符合</label></div>
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">上一题</button>
      <button class="btn next" onclick="nextSlide()">下一题</button>
    </div>
  </div>
</div>`;
  }
});

// 提交页
html += `
<div class="slide">
  <div class="card">
    <div class="title">全部完成</div>
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">返回</button>
      <button class="btn submit" onclick="submitTest()">提交并查看报告</button>
    </div>
  </div>
</div>`;

slider.innerHTML = html;

// 滑动逻辑
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
const total = slides.length;
const progress = document.getElementById('progress');

function updateProgress() {
  progress.style.width = (currentSlide / (total - 1)) * 100 + '%';
}
function nextSlide() {
  if (currentSlide >= total - 1) return;
  currentSlide++;
  slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
  updateProgress();
}
function prevSlide() {
  if (currentSlide <= 0) return;
  currentSlide--;
  slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
  updateProgress();
}

// 选完自动下一题
document.querySelectorAll('input[type="radio"]').forEach(i => {
  i.addEventListener('change', () => {
    setTimeout(nextSlide, 300);
  });
});

// ========== 在这里替换成你的 Supabase 信息 ==========
const supabase = supabase.createClient(
  "https://dbaiyejeplerltfavghd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiYWl5ZWplcGxlcmx0ZmF2Z2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQyMjQsImV4cCI6MjA5MDk0MDIyNH0.mcxFJ353pNgptNHej3wT5qDl1_WxU3KQM_J41n54KVg"
);
// ===================================================

async function submitTest() {
  const data = {};
  let lonely = 0, fake = 0;

  // 读取基础信息
  basicSlides.forEach(b => {
    data[b.name] = document.querySelector(`input[name="info_${b.name}"]:checked`)?.value || "未填写";
  });

  // 读取所有题目
  for (const q of questions) {
    const val = document.querySelector(`input[name="${q.name}"]:checked`)?.value;
    if (!val) return alert("请完成所有题目");
    data[q.name] = val;
    if (q.type === "lonely") lonely += Number(val);
    if (q.type === "fake") fake += Number(val);
  }

  // 总分
  data.loneliness_score = lonely;
  data.fake_intimacy_score = fake;
  data.submit_time = new Date().toISOString();

  // 上传
  const { error } = await supabase.from("survey_full").insert([data]);
  if (error) {
    console.error(error);
    alert("提交失败：" + error.message);
    return;
  }

  // 生成报告
  genReport(lonely, fake, data.belief_lonely, data.belief_fake);
  document.getElementById("modal").style.display = "flex";
}

// 报告（含定义解答）
function genReport(s1, s2, ans_lonely, ans_fake) {
  let txt = '';
  txt += "📌 你的理解\n";
  txt += "• 你认为孤独是：" + ans_lonely + "\n";
  txt += "• 你认为假性亲密是：" + ans_fake + "\n\n";

  txt += "🧠【专业定义解答】\n";
  txt += "🔹孤独：不是没人陪，而是「情感联结缺失」——渴望被理解、被看见，但需求长期未被满足。\n";
  txt += "🔹假性亲密：表面熟络、互动频繁，但内心设防、无真实情感流动，靠礼貌与敷衍维持。\n\n";

  txt += "📊【孤独感指数】" + s1 + "\n";
  if (s1 <= 14) txt += "✅ 低孤独｜内心稳定，有安全感\n";
  else if (s1 <= 24) txt += "⚠️ 中度孤独｜偶尔封闭，渴望深度联结\n";
  else txt += "🔴 高孤独｜长期情感隔离，内心脆弱\n";

  txt += "\n📊【假性亲密指数】" + s2 + "\n";
  if (s2 <= 14) txt += "✅ 低假性亲密｜关系真实，敢于真诚\n";
  else if (s2 <= 24) txt += "⚠️ 中度假性亲密｜习惯表面和谐\n";
  else txt += "🔴 高假性亲密｜长期戴面具，难以信任\n";

  txt += "\n💡【深度改善建议】\n";
  txt += "1. 每周至少一次不带手机的深度聊天\n";
  txt += "2. 情绪来临时试着表达，而不是独自压抑\n";
  txt += "3. 拒绝无意义社交，把精力留给值得的人\n";
  txt += "4. 允许自己不完美，允许别人靠近你\n";
  txt += "5. 脆弱不是缺点，而是亲密关系的开始\n";

  document.getElementById("score1").innerText = s1;
  document.getElementById("score2").innerText = s2;
  document.getElementById("resultText").innerText = txt;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function saveReport() {
  html2canvas(document.getElementById("reportCard")).then(canvas => {
    const a = document.createElement("a");
    a.download = "孤独与假性亲密报告.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });
}

updateProgress();
</script>
</body>
</html>
