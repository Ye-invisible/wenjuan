<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识你自己 · 解锁真实联结</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f9fd;
            overflow: hidden;
            background-image: linear-gradient(120deg, #f8f9fd 0%, #f0f2fa 100%);
        }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #eaeef5;
            z-index: 999;
        }
        .progress {
            height: 100%;
            background: #5F4B8B;
            width: 0%;
            transition: 0.35s ease;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            display: flex;
            transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .slide {
            min-width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white;
            width: 100%;
            max-width: 720px;
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(95,75,139,0.08);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #5F4B8B;
        }
        .title {
            font-size: 21px;
            margin-bottom: 28px;
            color: #2c3e50;
            line-height: 1.6;
            font-weight: 500;
        }
        .start-title {
            font-size: 24px;
            color: #5F4B8B;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .start-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            text-align: center;
        }
        .option {
            margin: 14px 0;
            padding: 14px 18px;
            border: 1px solid #eee;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
        }
        .option:hover {
            background: #f5f2ff;
            border-color: #c5b9e0;
        }
        .option input {
            width: 20px;
            height: 20px;
            margin-right: 14px;
            accent-color: #5F4B8B;
        }
        .nav-buttons {
            display: flex;
            gap: 14px;
            margin-top: 35px;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }
        .next, .start-btn {
            background: #5F4B8B;
            color: white;
        }
        .prev {
            background: #f1f3f6;
            color: #555;
        }
        .submit {
            background: #4CD9B0;
            color: white;
        }
        .save-btn {
            background: #5F4B8B;
            color: white;
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: modalIn 0.4s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content {
            background: white;
            max-width: 700px;
            width: 90%;
            padding: 45px 35px;
            border-radius: 24px;
            text-align: left;
            max-height: 90vh;
            overflow-y: auto;
        }
        .score {
            font-size: 20px;
            margin: 8px 0;
            color: #2c3e50;
        }
        .score span {
            font-size: 32px;
            color: #5F4B8B;
            font-weight: bold;
        }
        #resultText {
            font-size: 16px;
            line-height: 1.8;
            margin: 20px 0;
            color: #333;
            white-space: pre-line;
        }
    </style>
</head>
<body>

<div class="progress-bar"><div class="progress" id="progress"></div></div>
<div class="slider" id="slider"></div>

<div class="modal" id="modal">
    <div class="modal-content" id="reportCard">
        <h2 style="color:#5F4B8B; margin-bottom:20px;">你的专属心理行为报告</h2>
        <div class="score">孤独感指数：<span id="score1">0</span></div>
        <div class="score">假性亲密指数：<span id="score2">0</span></div>
        <div id="resultText"></div>
        <button class="btn save-btn" onclick="saveReport()">保存报告图片</button>
        <button class="btn prev" onclick="closeModal()" style="margin-top:10px;">关闭</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// 题目：17题（15+2定义）
const questions = [
  { q: "身边没有真正懂我的人", type: "lonely", name: "q1" },
  { q: "身处人群仍感到孤独", type: "lonely", name: "q2" },
  { q: "我习惯隐藏心事", type: "lonely", name: "q3" },
  { q: "我难以建立深度关系", type: "lonely", name: "q4" },
  { q: "我常感到空虚无寄托", type: "lonely", name: "q5" },
  { q: "我多是表面朋友，难信任", type: "fake", name: "q6" },
  { q: "我常隐藏真实想法迎合他人", type: "fake", name: "q7" },
  { q: "关系亲密但无深层交流", type: "fake", name: "q8" },
  { q: "我很少暴露脆弱", type: "fake", name: "q9" },
  { q: "表面关系结束我感到轻松", type: "fake", name: "q10" },
  { q: "我社交多为功利目的", type: "fake", name: "q11" },
  { q: "拿到生活费更愿意独自使用", type: "act", name: "act1" },
  { q: "心情不好独自消化不找人说", type: "act", name: "act2" },
  { q: "不想社交仍勉强参加怕尴尬", type: "act", name: "act3" },
  { q: "朋友倾诉我礼貌敷衍", type: "act", name: "act4" },
  { q: "你认为孤独是什么？", type: "belief", name: "belief_lonely" },
  { q: "你认为假性亲密是什么？", type: "belief", name: "belief_fake" },
];

// 随机打乱
const shuffled = [...questions].sort(() => Math.random() - 0.5);

// 基础信息
const basicSlides = [
  { title: "1. 性别", options: ["男","女"], name: "gender" },
  { title: "2. 年级", options: ["大一","大二","大三","大四","研究生"], name: "grade" },
  { title: "3. 是否住校", options: ["是","否"], name: "live" },
  { title: "4. 可交心挚友", options: ["0个","1-2个","3-5个","6个以上"], name: "friends" },
  { title: "5. 情感状态", options: ["单身","恋爱中","暧昧"], name: "love" },
  { title: "6. 家庭亲密程度", options: ["极高，无话不谈","较高，经常沟通","一般，偶尔联系","较低，疏远"], name: "family" },
];

// 生成页面
const slider = document.getElementById('slider');
let html = '';

// 开始页
html += `
<div class="slide">
  <div class="card">
    <div class="start-title">认识你自己 · 解锁真实联结</div>
    <div class="start-desc">孤独感 × 假性亲密 × 行为模式综合评估</div>
    <div class="start-desc">亲爱的同学：<br>
    你是否有过这样的时刻？身处喧闹的宿舍、热闹的社团，却依然觉得“没人懂我”；拥有很多“好友”，却找不到一个可以毫无保留倾诉心事的人；看似融入集体，内心却始终隔着一层距离……<br><br>
    这份问卷是心理健康课程调研，更是一次自我探索的机会——帮你看清人际交往状态，读懂内心的孤独与困惑，解锁真实、舒适的亲密关系❤️<br><br>
    每一个选择，都是你了解自己的一步。感谢你的真诚参与！</div>
    <div style="height:20px;"></div>
    <button class="btn start-btn" onclick="nextSlide()">开始测试 →</button>
  </div>
</div>`;

// 基础信息页
basicSlides.forEach(item => {
  html += `
<div class="slide">
  <div class="card">
    <div class="title">${item.title}</div>
    ${item.options.map(o => `
    <div class="option">
      <input type="radio" name="info_${item.name}" value="${o}">
      <label>${o}</label>
    </div>`).join('')}
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">返回</button>
      <button class="btn next" onclick="nextSlide()">下一步</button>
    </div>
  </div>
</div>`;
});

// 17题随机页
shuffled.forEach((item, i) => {
  if (item.name.startsWith('belief')) {
    const opts = item.name === 'belief_lonely' 
      ? ["只是没人陪", "情感需求未被满足的痛苦", "性格内向", "正常的人生状态"]
      : ["关系很好只是话少", "表面亲近但内心疏远", "相处舒服就行", "正常社交"];
    html += `
<div class="slide">
  <div class="card">
    <div class="title">${i+1}. ${item.q}</div>
    ${opts.map(o => `
    <div class="option">
      <input type="radio" name="${item.name}" value="${o}">
      <label>${o}</label>
    </div>`).join('')}
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">上一题</button>
      <button class="btn next" onclick="nextSlide()">下一题</button>
    </div>
  </div>
</div>`;
  } else {
    html += `
<div class="slide">
  <div class="card">
    <div class="title">${i+1}. ${item.q}</div>
    <div class="option"><input type="radio" name="${item.name}" value="1"><label>完全不符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="2"><label>不太符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="3"><label>不确定</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="4"><label>比较符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="5"><label>完全符合</label></div>
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">上一题</button>
      <button class="btn next" onclick="nextSlide()">下一题</button>
    </div>
  </div>
</div>`;
  }
});

// 提交页
html += `
<div class="slide">
  <div class="card">
    <div class="title">全部完成</div>
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">返回</button>
      <button class="btn submit" onclick="submitTest()">提交并查看报告</button>
    </div>
  </div>
</div>`;

slider.innerHTML = html;

// 滑动逻辑
let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
const total = slides.length;
const progress = document.getElementById('progress');

function updateProgress() {
  progress.style.width = (currentSlide / (total - 1)) * 100 + '%';
}
function nextSlide() {
  if (currentSlide >= total - 1) return;
  currentSlide++;
  slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
  updateProgress();
}
function prevSlide() {
  if (currentSlide <= 0) return;
  currentSlide--;
  slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
  updateProgress();
}

// 选完自动下一题
document.querySelectorAll('input[type="radio"]').forEach(i => {
  i.addEventListener('change', () => {
    setTimeout(nextSlide, 300);
  });
});

// Supabase
const sb = supabase.createClient(
  "https://dbaiyejeplerltfavghd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiYWl5ZWplcGxlcmx0ZmF2Z2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQyMjQsImV4cCI6MjA5MDk0MDIyNH0.mcxFJ353pNgptNHej3wT5qDl1_WxU3KQM_J41n54KVg"
);

async function submitTest() {
  const data = {};
  let lonely = 0, fake = 0;

  basicSlides.forEach(b => {
    data[b.name] = document.querySelector(`input[name="info_${b.name}"]:checked`)?.value || "未填写";
  });

  for (const q of questions) {
    const val = document.querySelector(`input[name="${q.name}"]:checked`)?.value;
    if (!val) return alert("请完成所有题目");
    data[q.name] = val;
    if (q.type === "lonely") lonely += Number(val);
    if (q.type === "fake") fake += Number(val);
  }

  data.loneliness_score = lonely;
  data.fake_intimacy_score = fake;
  data.submit_time = new Date().toISOString();

  const { error } = await sb.from("survey_full").insert([data]);
  if (error) {
    console.error(error);
    alert("提交失败：" + error.message);
    return;
  }

  genReport(lonely, fake, data.belief_lonely, data.belief_fake, data.grade);
  document.getElementById("modal").style.display = "flex";
}

// 报告生成（完全通用大学生版，无任何清华内容）
function genReport(s1, s2, ans_lonely, ans_fake, grade) {
  let txt = '';

  txt += "📌 你的心理认知\n";
  txt += "• 你认为孤独是：" + ans_lonely + "\n";
  txt += "• 你认为假性亲密是：" + ans_fake + "\n\n";

  txt += "🧠【专业心理定义】\n";
  txt += "🔹孤独：并非“独处”，而是大学生在学习压力、社交环境中，依然存在的「情感联结缺失」——渴望被理解、被看见，却因学业忙碌、社交壁垒、自我设防等原因，导致心理需求长期未被满足。\n";
  txt += "🔹假性亲密：在宿舍、社团、班级中常见的“表面和谐”关系——互动频繁、礼貌周到，但内心设防，不暴露真实情绪与脆弱，靠寒暄、任务式交往维持，无深层情感流动。\n\n";

  txt += "📊【你的孤独感指数】" + s1 + "（满分25分）\n";
  if (s1 <= 10) {
    txt += "✅ 低孤独状态｜你的心理状态较为稳定，有良好的情感联结能力，能够主动建立或维系深度关系，不易陷入情感孤立。\n";
    txt += "→ 心理发展建议：继续保持开放心态，在忙碌的学习中保留与挚友的深度沟通，同时可尝试带动身边有孤独感的同学，传递积极能量。\n";
  } else if (s1 <= 18) {
    txt += "⚠️ 中度孤独状态｜你偶尔会感到孤独，尤其在压力大、社交疲惫时，容易陷入内心封闭，有倾诉需求但不愿主动表达。\n";
    txt += "→ 困境处理建议：1.不必强迫自己合群，优先选择1-2个信任的人分享情绪；2.参加兴趣社团，找到同频伙伴；3.区分独处与孤独，学会主动求助。\n";
  } else {
    txt += "🔴 高孤独状态｜你长期处于情感隔离状态，习惯隐藏心事、自我封闭，学习与社交压力可能加剧了孤独感，内心需求长期未被满足。\n";
    txt += "→ 困境处理建议：1.孤独是正常信号，不是性格缺陷；2.从微小互动开始，建立轻松日常联结；3.减少手机逃避，培养兴趣打破封闭；4.必要时寻求学校心理咨询支持。\n";
  }

  txt += "\n📊【你的假性亲密指数】" + s2 + "（满分30分）\n";
  if (s2 <= 12) {
    txt += "✅ 低假性亲密状态｜你在交往中能够保持真诚，敢于展现真实的自己，不刻意迎合他人，能建立高质量深度关系。\n";
    txt += "→ 心理发展建议：继续保持真诚，同时尊重他人边界，避免因过度真诚产生不必要的内耗。\n";
  } else if (s2 <= 22) {
    txt += "⚠️ 中度假性亲密状态｜你存在一定的表面社交倾向，偶尔会隐藏想法迎合他人，在集体中习惯用礼貌维持关系，内心存在距离感。\n";
    txt += "→ 困境处理建议：1.减少无效社交，专注维系值得的关系；2.在信任的人面前尝试表达真实想法；3.不必强迫自己参与所有活动。\n";
  } else {
    txt += "🔴 高假性亲密状态｜你长期习惯社交伪装，内心高度设防，不愿暴露脆弱，害怕被伤害，关系大多停留在表面，难以建立深度联结。\n";
    txt += "→ 困境处理建议：1.接纳自我保护的本能，不必自责；2.从微小情绪分享开始，逐步建立信任；3.减少功利社交，把精力留给自己；4.长期疲惫可寻求专业心理支持。\n";
  }

  txt += "\n💡【大学生专属心理发展建议】\n";
  txt += "1. 学习与社交平衡：不必追求完美社交，合理分配时间，每周保留1-2小时深度沟通。\n";
  txt += "2. 善用校园资源：学校心理咨询中心可提供免费支持，兴趣社团是寻找同频伙伴的优质渠道。\n";
  txt += "3. 调整认知：孤独与假性亲密都是成长中的正常现象，关键是正视自己的真实需求。\n";
  txt += "4. 从小行动开始：每天做一件打破封闭的小事，逐步建立自然、舒适的情感联结。\n";
  txt += "5. 关注自我成长：接纳自己的不完美，允许有困惑与情绪，在自我探索中成为更从容的自己。\n";

  txt += "\n💌 致每一个努力的你：每一次自我探索，都在让你靠近更真实的自己。愿你在大学时光里，既能专注成长，也能拥有温暖真诚的关系，不必伪装，不必孤立，自在从容，闪闪发光✨";

  document.getElementById("score1").innerText = s1;
  document.getElementById("score2").innerText = s2;
  document.getElementById("resultText").innerText = txt;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function saveReport() {
  html2canvas(document.getElementById("reportCard")).then(canvas => {
    const a = document.createElement("a");
    a.download = "心理评估报告.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });
}

updateProgress();
</script>
</body>
</html>
