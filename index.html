<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识你自己 · 解锁真实联结</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f8f9fd;
            overflow: hidden;
            background-image: linear-gradient(120deg, #f8f9fd 0%, #f0f2fa 100%);
        }
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #eaeef5;
            z-index: 999;
        }
        .progress {
            height: 100%;
            background: #5F4B8B;
            width: 0%;
            transition: 0.35s ease;
        }
        .slider {
            width: 100vw;
            height: 100vh;
            display: flex;
            transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .slide {
            min-width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white;
            width: 100%;
            max-width: 720px;
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(95,75,139,0.08);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: #5F4B8B;
        }
        .title {
            font-size: 21px;
            margin-bottom: 28px;
            color: #2c3e50;
            line-height: 1.6;
            font-weight: 500;
        }
        .start-title {
            font-size: 24px;
            color: #5F4B8B;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .start-desc {
            font-size: 16px;
            color: #555;
            line-height: 1.8;
            text-align: center;
        }
        .option {
            margin: 14px 0;
            padding: 14px 18px;
            border: 1px solid #eee;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.25s ease;
            display: flex;
            align-items: center;
        }
        .option:hover {
            background: #f5f2ff;
            border-color: #c5b9e0;
        }
        .option input {
            width: 20px;
            height: 20px;
            margin-right: 14px;
            accent-color: #5F4B8B;
        }
        .nav-buttons {
            display: flex;
            gap: 14px;
            margin-top: 35px;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.25s;
            font-weight: 500;
        }
        .next, .start-btn {
            background: #5F4B8B;
            color: white;
        }
        .prev {
            background: #f1f3f6;
            color: #555;
        }
        .submit {
            background: #4CD9B0;
            color: white;
        }
        .save-btn {
            background: #5F4B8B;
            color: white;
            margin-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: modalIn 0.4s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content {
            background: white;
            max-width: 700px;
            width: 90%;
            padding: 40px 30px;
            border-radius: 24px;
            text-align: left;
            max-height: 90vh;
            overflow-y: auto;
        }

        /* 报告美化样式（核心优化） */
        .report-block {
            background: #fafbff;
            border-radius: 16px;
            padding: 16px 20px;
            margin: 12px 0;
            border-left: 4px solid #5F4B8B;
        }
        .report-score {
            font-size: 22px;
            font-weight: bold;
            color: #5F4B8B;
            margin-bottom: 8px;
        }
        .report-level {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .report-desc {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
        }
        .report-tip {
            font-size: 14px;
            color: #666;
            background: #f0f2ff;
            padding: 10px 14px;
            border-radius: 12px;
            margin-top: 8px;
        }
        .report-end {
            text-align: center;
            font-size: 15px;
            color: #5F4B8B;
            font-weight: 500;
            margin-top: 20px;
            line-height: 1.6;
        }
        .score-panel {
            display: flex;
            gap: 20px;
            margin: 10px 0 20px;
        }
        .score-item {
            flex: 1;
            background: #f8f9ff;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }
        .score-num {
            font-size: 32px;
            font-weight: bold;
            color: #5F4B8B;
        }
        .score-label {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="progress-bar"><div class="progress" id="progress"></div></div>
<div class="slider" id="slider"></div>

<div class="modal" id="modal">
    <div class="modal-content" id="reportCard">
        <h2 style="color:#5F4B8B; text-align:center; margin-bottom:20px;">你的专属心理报告</h2>
        
        <div class="score-panel">
            <div class="score-item">
                <div class="score-num" id="score1">0</div>
                <div class="score-label">孤独感指数</div>
            </div>
            <div class="score-item">
                <div class="score-num" id="score2">0</div>
                <div class="score-label">假性亲密指数</div>
            </div>
        </div>

        <div id="resultText" style="font-size:15px; line-height:1.6;"></div>

        <button class="btn save-btn" onclick="saveReport()">保存报告图片</button>
        <button class="btn prev" onclick="closeModal()" style="margin-top:10px;">关闭</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const questions = [
  { q: "身边没有真正懂我的人", type: "lonely", name: "q1" },
  { q: "身处人群仍感到孤独", type: "lonely", name: "q2" },
  { q: "我习惯隐藏心事", type: "lonely", name: "q3" },
  { q: "我难以建立深度关系", type: "lonely", name: "q4" },
  { q: "我常感到空虚无寄托", type: "lonely", name: "q5" },
  { q: "我多是表面朋友，难信任", type: "fake", name: "q6" },
  { q: "我常隐藏真实想法迎合他人", type: "fake", name: "q7" },
  { q: "关系亲密但无深层交流", type: "fake", name: "q8" },
  { q: "我很少暴露脆弱", type: "fake", name: "q9" },
  { q: "表面关系结束我感到轻松", type: "fake", name: "q10" },
  { q: "我社交多为功利目的", type: "fake", name: "q11" },
  { q: "拿到生活费更愿意独自使用", type: "act", name: "act1" },
  { q: "心情不好独自消化不找人说", type: "act", name: "act2" },
  { q: "不想社交仍勉强参加怕尴尬", type: "act", name: "act3" },
  { q: "朋友倾诉我礼貌敷衍", type: "act", name: "act4" },
  { q: "你认为孤独是什么？", type: "belief", name: "belief_lonely" },
  { q: "你认为假性亲密是什么？", type: "belief", name: "belief_fake" },
];

const shuffled = [...questions].sort(() => Math.random() - 0.5);

const basicSlides = [
  { title: "1. 性别", options: ["男","女"], name: "gender" },
  { title: "2. 年级", options: ["大一","大二","大三","大四","研究生"], name: "grade" },
  { title: "3. 是否住校", options: ["是","否"], name: "live" },
  { title: "4. 可交心挚友", options: ["0个","1-2个","3-5个","6个以上"], name: "friends" },
  { title: "5. 情感状态", options: ["单身","恋爱中","暧昧"], name: "love" },
  { title: "6. 家庭亲密程度", options: ["极高，无话不谈","较高，经常沟通","一般，偶尔联系","较低，疏远"], name: "family" },
];

const slider = document.getElementById('slider');
let html = '';

html += `
<div class="slide">
  <div class="card">
    <div class="start-title">认识你自己 · 解锁真实联结</div>
    <div class="start-desc">
    你是否身处人群却倍感孤独？有很多朋友却无法交心？<br><br>
    这是一份专业心理评估，帮你看清孤独与假性亲密，遇见更真实的自己❤️
    </div>
    <div style="height:20px;"></div>
    <button class="btn start-btn" onclick="nextSlide()">开始测试 →</button>
  </div>
</div>`;

basicSlides.forEach(item => {
  html += `
<div class="slide">
  <div class="card">
    <div class="title">${item.title}</div>
    ${item.options.map(o => `
    <div class="option">
      <input type="radio" name="info_${item.name}" value="${o}">
      <label>${o}</label>
    </div>`).join('')}
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">返回</button>
      <button class="btn next" onclick="nextSlide()">下一步</button>
    </div>
  </div>
</div>`;
});

shuffled.forEach((item, i) => {
  if (item.name.startsWith('belief')) {
    const opts = item.name === 'belief_lonely' 
      ? ["只是没人陪", "情感需求未被满足", "性格内向", "正常状态"]
      : ["关系好但话少", "表面亲近内心疏远", "相处舒服即可", "正常社交"];
    html += `
<div class="slide">
  <div class="card">
    <div class="title">${i+1}. ${item.q}</div>
    ${opts.map(o => `
    <div class="option">
      <input type="radio" name="${item.name}" value="${o}">
      <label>${o}</label>
    </div>`).join('')}
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">上一题</button>
      <button class="btn next" onclick="nextSlide()">下一题</button>
    </div>
  </div>
</div>`;
  } else {
    html += `
<div class="slide">
  <div class="card">
    <div class="title">${i+1}. ${item.q}</div>
    <div class="option"><input type="radio" name="${item.name}" value="1"><label>完全不符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="2"><label>不太符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="3"><label>不确定</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="4"><label>比较符合</label></div>
    <div class="option"><input type="radio" name="${item.name}" value="5"><label>完全符合</label></div>
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">上一题</button>
      <button class="btn next" onclick="nextSlide()">下一题</button>
    </div>
  </div>
</div>`;
  }
});

html += `
<div class="slide">
  <div class="card">
    <div class="title">全部完成</div>
    <div class="nav-buttons">
      <button class="btn prev" onclick="prevSlide()">返回</button>
      <button class="btn submit" onclick="submitTest()">提交并查看报告</button>
    </div>
  </div>
</div>`;

slider.innerHTML = html;

let currentSlide = 0;
const slides = document.querySelectorAll('.slide');
const total = slides.length;
const progress = document.getElementById('progress');

function updateProgress() {
  progress.style.width = (currentSlide / (total - 1)) * 100 + '%';
}
function nextSlide() {
  if (currentSlide >= total - 1) return;
  currentSlide++;
  slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
  updateProgress();
}
function prevSlide() {
  if (currentSlide <= 0) return;
  currentSlide--;
  slider.style.transform = `translateX(-${currentSlide * 100}vw)`;
  updateProgress();
}

document.querySelectorAll('input[type="radio"]').forEach(i => {
  i.addEventListener('change', () => {
    setTimeout(nextSlide, 300);
  });
});

const sb = supabase.createClient(
  "https://dbaiyejeplerltfavghd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRiYWl5ZWplcGxlcmx0ZmF2Z2hkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzNjQyMjQsImV4cCI6MjA5MDk0MDIyNH0.mcxFJ353pNgptNHej3wT5qDl1_WxU3KQM_J41n54KVg"
);

async function submitTest() {
  const data = {};
  let lonely = 0, fake = 0;

  basicSlides.forEach(b => {
    data[b.name] = document.querySelector(`input[name="info_${b.name}"]:checked`)?.value || "未填写";
  });

  for (const q of questions) {
    const val = document.querySelector(`input[name="${q.name}"]:checked`)?.value;
    if (!val) return alert("请完成所有题目");
    data[q.name] = val;
    if (q.type === "lonely") lonely += Number(val);
    if (q.type === "fake") fake += Number(val);
  }

  data.loneliness_score = lonely;
  data.fake_intimacy_score = fake;
  data.submit_time = new Date().toISOString();

  const { error } = await sb.from("survey_full").insert([data]);
  if (error) {
    console.error(error);
    alert("提交失败：" + error.message);
    return;
  }

  genReport(lonely, fake, data.belief_lonely, data.belief_fake);
  document.getElementById("modal").style.display = "flex";
}

// ===================== 核心：美化版报告（精简+设计感）=====================
function genReport(s1, s2, ans_lonely, ans_fake) {
  let txt = '';

  // 孤独模块
  txt += `<div class="report-block">`;
  txt += `<div class="report-score">🌫 孤独感指数 ${s1}/25</div>`;
  if (s1 <= 10) {
    txt += `<div class="report-level">✅ 低孤独｜内心稳定，联结良好</div>`;
    txt += `<div class="report-desc">你能建立真实关系，不易陷入孤立。</div>`;
    txt += `<div class="report-tip">保持开放，多与挚友深度交流即可。</div>`;
  } else if (s1 <= 18) {
    txt += `<div class="report-level">⚠️ 中度孤独｜偶尔封闭，渴望靠近</div>`;
    txt += `<div class="report-desc">压力大时易孤独，有倾诉欲但不敢表达。</div>`;
    txt += `<div class="report-tip">找1-2个信任的人分享情绪，不必强迫合群。</div>`;
  } else {
    txt += `<div class="report-level">🔴 高孤独｜长期隔离，内心缺爱</div>`;
    txt += `<div class="report-desc">习惯隐藏自己，情感需求长期未被满足。</div>`;
    txt += `<div class="report-tip">从小互动开始打破封闭，必要时寻求心理咨询。</div>`;
  }
  txt += `</div>`;

  // 假性亲密模块
  txt += `<div class="report-block">`;
  txt += `<div class="report-score">🎭 假性亲密指数 ${s2}/30</div>`;
  if (s2 <= 12) {
    txt += `<div class="report-level">✅ 低假性｜真诚坦荡，关系高质量</div>`;
    txt += `<div class="report-desc">你敢于做自己，不迎合、不伪装。</div>`;
    txt += `<div class="report-tip">继续真诚，同时守住边界。</div>`;
  } else if (s2 <= 22) {
    txt += `<div class="report-level">⚠️ 中度假性｜表面社交，内心有距</div>`;
    txt += `<div class="report-desc">偶尔隐藏想法，用礼貌维持关系。</div>`;
    txt += `<div class="report-tip">减少无效社交，对信任的人更真实一点。</div>`;
  } else {
    txt += `<div class="report-level">🔴 高假性｜长期戴面具，不敢 vulnerability</div>`;
    txt += `<div class="report-desc">极度设防，关系停在表面，难以深交。</div>`;
    txt += `<div class="report-tip">允许自己脆弱，从微小分享开始重建信任。</div>`;
  }
  txt += `</div>`;

  // 你的理解
  txt += `<div class="report-block" style="background:#f0f7ff; border-left-color:#4a90e2;">`;
  txt += `<div class="report-level">💬 你的认知</div>`;
  txt += `<div class="report-desc">• 你理解的孤独：${ans_lonely}</div>`;
  txt += `<div class="report-desc">• 你理解的假性亲密：${ans_fake}</div>`;
  txt += `</div>`;

  // 简短建议
  txt += `<div class="report-block">`;
  txt += `<div class="report-level">✨ 成长建议</div>`;
  txt += `<div class="report-desc">1. 每周留1次深度聊天<br>`;
  txt += `2. 不必讨好，做自己就好<br>`;
  txt += `3. 孤独不是错，是需要被看见<br>`;
  txt += `4. 从小行动打破封闭，慢慢来</div>`;
  txt += `</div>`;

  // 结尾
  txt += `<div class="report-end">愿你不必伪装，也能被温柔接住✨</div>`;

  document.getElementById("score1").innerText = s1;
  document.getElementById("score2").innerText = s2;
  document.getElementById("resultText").innerHTML = txt;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function saveReport() {
  html2canvas(document.getElementById("reportCard")).then(canvas => {
    const a = document.createElement("a");
    a.download = "心理评估报告.png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });
}

updateProgress();
</script>
</body>
</html>
